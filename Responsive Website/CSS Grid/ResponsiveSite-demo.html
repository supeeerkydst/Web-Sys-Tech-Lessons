<html>
    <head>
        <!-- mobile-first design -->
         <meta name="viewport" content="width=device-width, initial-scale = 1.0">    
        <!-- this tag is used to connect an external file (css) -->
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <br><br>
        <div class="container">
            <div class="row">
                <div class="col-md-1">&nbsp;</div>
                <div class="col-md-10">
                    <table class="table table-hover">
                        <thead>
                            <th>Student Name</th>
                            <th>Gender</th>
                        </thead>
                        <tbody id="users">
                        </tbody>
                    </table>
                </div>
                <div class="col-md-1">&nbsp;</div>
            </div>
            <div class="row"><br><br></div>
            <div class="row">
                <div class="col-md-3">
                    &nbsp;
                </div>
                <div class="col-md-6">
                   <div class="row">
                        <div class="col-sm-4">
                            <input id="lname" class="form-control" type="text" placeholder="Last Name"/>
                        </div>
                        
                        <div class="col-sm-4">
                            <input id="fname" class="form-control" type="text" placeholder="First Name"/>
                        </div>
                        
                        <div class="col-sm-4">
                            <input id="mname" class="form-control" type="text" placeholder="Middle Name"/>
                        </div>
                   </div>
                </div>
                <div class="col-md-3">
                    &nbsp;
                </div>
            </div>
            <div class="row">
                <div class="col-md-3">&nbsp;</div>
                <div class="col-md-6">
                    <input class="form-check-inline gender" type="radio" name="gender" value="Male"> Male
                    <input class="form-check-inline gender" type="radio" name="gender" value="Female"> Female
                </div>
                <div class="col-md-3">&nbsp;</div>
            </div>
            <div class="row">
                <div class="col-md-3"></div>
                <div class="col-md-6">
                    <button class="btn btn-primary" onclick="greetUser()" style="width: 100%">REGISTER ME</button>
                </div>
                <div class="col-md-3"></div>
            </div>
        </div>
    </body>
</html>

<!-- javscript -->
 <script>

            break;
        }
     } */

     function greetUser() {
        let fname = document.getElementById("fname").value;
        let mname = document.getElementById("mname").value;
        let lname = document.getElementById("lname").value;

        let __fullnName = fname + " " + mname + " " + lname;

        // array of objects
        let gender = document.getElementsByClassName("gender");

        let __gender = "";
        for (let i = 0; i < gender.length; i++) {
            if (gender[i].checked) {
                __gender = gender[i].value;
                break;
            }
        }

        let row = "<tr>"
            + "<td>" + __fullnName + "</td>"
            + "<td>" + __gender + "</td>"
            + "</tr>";

            // inooverwrite yung laman ng tag na tinatawag natin
        document.getElementById("users").innerHTML = row;
        /*
'            lahat ng value na galing sa input type text ay
            considered string
            so, kapag ang value po ay number
            kailangan i-parse yung value papunta sa data type nya

            parseInt()
        */
     }
 </script>
