<html>
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <style>
            div {
                padding-bottom: 2px;
                padding-top: 2px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row"><br></div>
            <div class="row"><br></div>
            <div class="row"><br></div>
            <div class="row">
                <div class="col-md-2">
                    <br>
                </div>
                <div class="col-md-8">
                    <div class="row">
                        <div class="col-sm-4">
                            <input type="text" class="form-control" placeholder="Last Name" id="lname">
                        </div>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" placeholder="First Name" id="fname">
                        </div>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" placeholder="Middle Name" id="mname">
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <br>
                </div>

                <div class="col-md-2">
                    <br>
                </div>
                <div class="col-md-8">
                    <div class="row">
                        <div class="col-sm-9">
                            <input type="text" class="form-control" id="birthyear" placeholder="birthyear" onkeyup="computeAge()">
                        </div>
                        <div class="col-sm-3">
                            <p id="age" class="text-primary fw-bold"></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <br>
                </div>
            </div>

            <div class="row">
                <div class="col-md-2"><br></div>
                <div class="col-md-8">
                    <div class="row">
                        <div class="col-sm-12">
                            <input class="form-check-input gender" type="radio" value="Male" name="gender"> Male &nbsp;&nbsp;
                            <input class="form-check-input gender" type="radio" value="Female" name="gender"> Female &nbsp;&nbsp;             
                        </div>
                    </div>
                </div>
                <div class="col-md-2"><br></div>
            </div>

            <div class="row">
                <div class="col-md-2"></div>
                <div class="col-md-8">
                    <div class="row">
                        <div class="col-sm-2">
                            <input type="checkbox" class="form-check-input food" value="Hamburger"> Hamburger
                        </div>
                        <div class="col-sm-2">
                            <input type="checkbox" class="form-check-input food" value="Spaghetti"> Spaghetti
                        </div>
                        <div class="col-sm-2">
                            <input type="checkbox" class="form-check-input food" value="Palabok"> Palabok
                        </div>
                        <div class="col-sm-2">
                            <input type="checkbox" class="form-check-input food" value="Hotdogs"> Hotdogs
                        </div>
                        <div class="col-sm-2">
                            <input type="checkbox" class="form-check-input food" value="Sopas"> Sopas
                        </div>
                        <div class="col-sm-2"></div>
                    </div>
                </div>
                <div class="col-md-2"></div>
            </div>

            <div class="row">
                <div class="col-md-2"></div>
                <div class="col-md-8">
                    <button class="btn btn-primary" onclick="register()">REGISTER ME</button>
                </div>
                <div class="col-md-2"></div>
            </div>

            <div class="row"><br></div>
        </div>
    </body>
</html>

<script>
    // Declare a global variable for age

    let __age = 0;

    function computeAge() {
        // get user input for birthyear
        let birthyear = document.getElementById("birthyear").value;
        
        // use the public variable to store the computed age
        __age = 2026 - birthyear;

        document.getElementById("age").innerHTML = __age;
    }

    function register() {
        // get user input from name
        let fname = document.getElementById("fname").value;
        let mname = document.getElementById("mname").value;
        let lname = document.getElementById("lname").value;

        let full_name = fname + " " + mname + " " + lname;

        // determine selected radio button from the gender options
        let gender_group = document.getElementsByClassName("gender");
        let __gender = "";
        
        for (let i = 0; i < gender_group; i+=1) {
            // check if selected
            if (gender_group[i].checked) {
                __gender = gender_group[i].value;
                break;
            }
        }

        // get all selected foods from the checkboxes
        let food_selection = document.getElementsByClassName("food");
        let __food = "";

        // using forEach
        for (let food of food_selection) {
            if (food.checked) {
                __food += food.value + ", ";
            }
        }

        // display in an alert
        alert("Name: " + full_name + "\n" + 
             "Gender: " + __gender + "\n" +
             "Age: " + __age + "\n" + 
             "Favorite Food/s: " + __food
        );
    }

</script>
